<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="ARUU’s EasyCRM CRM">

    <!-- 🚫 Disable browser cache -->
    <meta name="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="icon" type="image/png" href="favicon.png"/>
    <title>ARUU’s EasyCRM CRM</title>
    <link rel="manifest" href="manifest.json">

    <!-- 🚫 Disable Flutter Service Worker (IMPORTANT FIX) -->
    <script>
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
              registrations.forEach(function (registration) {
                registration.unregister();
              });
            });
          });
        }
    </script>
</head>

<body>

<!-- 🔥 Splash Screen -->
<div id="splash-screen">
    <video id="splash-gif" autoplay muted loop playsinline>
        <source src="crm_splash.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<!-- Screenshot Block Popup -->
<div id="screenshot-popup" style="
    display:none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    color: black;
    padding: 20px 40px;
    border: 2px solid red;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
    z-index: 10000;
    font-family: sans-serif;
    text-align: center;
">
    Screenshots are disabled!
</div>

<style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #fcfbf2;
      overflow: hidden;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      background: #fcfbf2;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #splash-gif {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }
</style>

<!-- 🚀 Flutter App Loader -->
<script src="flutter_bootstrap.js" async></script>

<!-- Splash hide after Flutter loads -->
<script>
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        document.body.style.overflow = '';
        splash.remove();
      }
    });

    setTimeout(() => {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        document.body.style.overflow = '';
        splash.remove();
      }
    }, 15000);
</script>

<!-- PrintScreen block -->
<script>
    document.addEventListener("keyup", function (e) {
      if (e.key === "PrintScreen") {
        navigator.clipboard.writeText("");
        const popup = document.getElementById('screenshot-popup');
        if (popup) {
          popup.style.display = 'block';
          setTimeout(() => { popup.style.display = 'none'; }, 3000);
        }
      }
    });
</script>

<!-- Ctrl + P block -->
<script>
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        e.preventDefault();
        const popup = document.getElementById('screenshot-popup');
        if (popup) {
          popup.style.display = 'block';
          setTimeout(() => { popup.style.display = 'none'; }, 3000);
        }
      }
    });
</script>

</body>
</html>
